<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e293b" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e293b" stroke-width="1"/>
  <!-- Left emerald accent bar -->
  <rect x="0" y="0" width="10" height="630" fill="#10b981"/>
  <!-- Top accent line -->
  <rect x="10" y="0" width="1190" height="4" fill="#10b981" opacity="0.3"/>
  <!-- TRADE90 wordmark -->
  <text x="100" y="290" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="900" font-size="108" fill="#ffffff" letter-spacing="-5">TRADE90</text>
  <!-- Emerald divider -->
  <rect x="100" y="320" width="80" height="5" fill="#10b981" rx="2"/>
  <!-- Tagline -->
  <text x="100" y="385" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="400" font-size="34" fill="#94a3b8" letter-spacing="0">Position Size Calculator for Funded Traders</text>
  <!-- Sub-line -->
  <text x="100" y="435" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="700" font-size="20" fill="#10b981" letter-spacing="4">TRADENINETY.COM</text>
  <!-- Decorative emerald circle top-right -->
  <circle cx="1100" cy="120" r="180" fill="#10b981" opacity="0.04"/>
  <circle cx="1100" cy="120" r="120" fill="#10b981" opacity="0.06"/>
  <circle cx="1100" cy="120" r="60" fill="#10b981" opacity="0.10"/>
  <!-- Bottom right badge -->
  <rect x="920" y="490" width="220" height="60" rx="12" fill="#10b981" opacity="0.12"/>
  <text x="1030" y="527" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="16" fill="#10b981" text-anchor="middle" letter-spacing="2">FREE CALCULATOR</text>
</svg>
